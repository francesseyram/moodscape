name: moodscape
description: "A mental wellness and mood companion application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── Firebase 
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # ── State Management 
  flutter_riverpod: ^2.5.1

  # ── Audio / Music Player 
  just_audio: ^0.9.40
  audio_service: ^0.18.13

  # ── Local Storage 
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Device Features 
  #record: ^4.4.4
  image_picker: ^1.1.2
  geolocator: ^13.0.1
  sensors_plus: ^6.0.1
  permission_handler: ^11.3.1

  # ── Notifications 
  flutter_local_notifications: ^18.0.1

  # ── UI & Charts 
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  lottie: ^3.1.2

  # ── Auth 
  google_sign_in: ^6.2.1

  # ── Utilities 
  connectivity_plus: ^6.1.0
  path_provider: ^2.1.4
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/lottie/

# ── Splash Screen Config 
#flutter_native_splash:
  #color: "#FFF8F9"
  #image: assets/images/splash_logo.png
  #android: true
  #ios: true